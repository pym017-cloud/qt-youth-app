<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>말씀ON — 순천침례교회</title>
  <meta name="theme-color" content="#FF9F1C"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="말씀ON"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;padding:0;min-height:100vh;font-family:'Noto Sans KR',system-ui,sans-serif;-webkit-font-smoothing:antialiased;background:#FFF8F0}

    :root{
      --bg:#FFF8F0;
      --surface:#fff;
      --surface-2:#FFF3E0;
      --orange:#FF9F1C;
      --orange-dark:#E8870A;
      --orange-soft:rgba(255,159,28,0.12);
      --yellow:#FFD43B;
      --yellow-soft:rgba(255,212,59,0.18);
      --green:#22C55E;
      --green-soft:rgba(34,197,94,0.12);
      --red:#EF4444;
      --text:#1C1408;
      --text-2:#6B5E45;
      --text-3:#B0A088;
      --divider:rgba(255,159,28,0.12);
      --card-shadow:0 2px 16px rgba(255,159,28,0.12);
      --radius:18px;
    }

    /* ── 로딩 ── */
    #loading{position:fixed;inset:0;background:var(--orange);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:9999;transition:opacity .4s}
    #loading.hidden{opacity:0;pointer-events:none}
    .ld-logo{font-size:56px;animation:bounce .7s ease infinite alternate}
    @keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-12px)}}
    .ld-title{font-size:24px;font-weight:900;color:#fff;letter-spacing:-.02em}
    .ld-sub{font-size:14px;color:rgba(255,255,255,.8);font-weight:600}
    .ld-dots{display:flex;gap:8px;margin-top:4px}
    .ld-dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.6);animation:dot 1.2s ease infinite}
    .ld-dot:nth-child(2){animation-delay:.2s}.ld-dot:nth-child(3){animation-delay:.4s}
    @keyframes dot{0%,80%,100%{transform:scale(1);opacity:.5}40%{transform:scale(1.4);opacity:1}}

    /* ── 로그인 ── */
    #login-screen{min-height:100vh;display:none;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;background:var(--bg)}
    #login-screen.visible{display:flex}
    .ln-hero{font-size:64px;margin-bottom:12px;animation:bounce .7s ease infinite alternate}
    .ln-title{font-size:28px;font-weight:900;color:var(--text);letter-spacing:-.03em;margin-bottom:6px;text-align:center}
    .ln-sub{font-size:15px;color:var(--text-2);text-align:center;line-height:1.6;margin-bottom:28px;font-weight:500}
    .ln-card{width:100%;max-width:360px;background:var(--surface);border-radius:24px;padding:26px 22px;box-shadow:0 8px 32px rgba(255,159,28,.18)}
    .ln-tabs{display:flex;gap:6px;margin-bottom:22px;background:var(--bg);border-radius:14px;padding:4px}
    .ln-tab{flex:1;height:38px;border-radius:10px;font-size:13px;font-weight:700;color:var(--text-3);border:0;background:transparent;cursor:pointer;font-family:inherit;transition:all .2s}
    .ln-tab.active{background:var(--surface);color:var(--orange);box-shadow:0 2px 8px rgba(255,159,28,.2)}
    .ln-label{font-size:12px;color:var(--text-2);font-weight:700;margin-bottom:7px;letter-spacing:.02em}
    .ln-input{width:100%;padding:13px 15px;border-radius:13px;background:var(--bg);border:2px solid transparent;color:var(--text);font-size:16px;font-family:inherit;outline:none;margin-bottom:11px;transition:border-color .2s;font-weight:500}
    .ln-input:focus{border-color:var(--orange);background:#fff}
    .ln-birth-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:11px}
    .ln-birth-input{padding:13px 8px;border-radius:13px;background:var(--bg);border:2px solid transparent;color:var(--text);font-size:18px;font-weight:700;font-family:inherit;outline:none;text-align:center;transition:border-color .2s;width:100%}
    .ln-birth-input:focus{border-color:var(--orange);background:#fff}
    .ln-birth-label{font-size:11px;color:var(--text-3);text-align:center;margin-top:-7px;margin-bottom:11px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;font-weight:600}
    .ln-btn{width:100%;height:54px;border-radius:15px;background:var(--orange);color:#fff;font-size:16px;font-weight:800;font-family:inherit;border:0;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(255,159,28,.4)}
    .ln-btn:hover{background:var(--orange-dark);transform:translateY(-1px)}
    .ln-btn:active{transform:translateY(0)}
    .ln-btn.ghost{background:var(--orange-soft);color:var(--orange);box-shadow:none;margin-top:8px}
    .ln-google{width:100%;height:50px;border-radius:13px;background:#fff;color:var(--text);font-size:14px;font-weight:700;font-family:inherit;border:2px solid var(--divider);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s;margin-top:6px}
    .ln-google:hover{border-color:var(--orange)}
    .ln-err{font-size:12px;color:var(--red);text-align:center;min-height:18px;margin-bottom:8px;font-weight:600}
    .ln-toggle{font-size:13px;color:var(--orange);text-align:center;margin-top:13px;cursor:pointer;font-weight:700}
    .ln-divider{text-align:center;color:var(--text-3);font-size:12px;margin:12px 0;position:relative;font-weight:600}
    .ln-divider::before,.ln-divider::after{content:'';position:absolute;top:50%;width:38%;height:1px;background:var(--divider)}
    .ln-divider::before{left:0}.ln-divider::after{right:0}

    /* ── 앱 ── */
    #app{display:none;max-width:428px;margin:0 auto;min-height:100vh}
    #app.visible{display:block}

    .qt-app{font-family:'Noto Sans KR',system-ui,sans-serif;color:var(--text);background:var(--bg);width:100%;min-height:100vh;display:flex;flex-direction:column;word-break:keep-all;overflow-wrap:break-word}
    .qt-app *{box-sizing:border-box}
    .qt-app button{font-family:inherit;cursor:pointer;border:0;padding:0;background:none}
    .qt-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:96px}
    .qt-scroll::-webkit-scrollbar{display:none}

    /* 탑바 */
    .qt-topbar{padding:18px 20px 6px;display:flex;align-items:center;justify-content:space-between}
    .qt-app-name{display:flex;align-items:center;gap:6px;font-size:16px;font-weight:900;color:var(--orange)}
    .qt-app-name-icon{font-size:18px}
    .qt-topbar-right{display:flex;align-items:center;gap:10px}
    .qt-point-pill{background:var(--yellow);color:var(--text);font-size:12px;font-weight:800;padding:5px 11px;border-radius:999px}
    .qt-date-greet{padding:2px 20px 14px;font-size:13px;color:var(--text-3);font-weight:500}
    .qt-user-greet{font-size:21px;font-weight:900;color:var(--text);padding:0 20px 14px;letter-spacing:-.02em}

    /* 스트릭 카드 */
    .qt-streak-card{margin:0 16px 12px;border-radius:var(--radius);background:linear-gradient(135deg,var(--orange) 0%,#FFB444 100%);padding:18px 20px;box-shadow:0 6px 24px rgba(255,159,28,.35);position:relative;overflow:hidden}
    .qt-streak-card::after{content:'🏆';position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:40px;opacity:.25}
    .qt-streak-label{font-size:12px;color:rgba(255,255,255,.8);font-weight:700;letter-spacing:.06em}
    .qt-streak-num{font-size:36px;font-weight:900;color:#fff;letter-spacing:-.03em;line-height:1;margin-top:3px}
    .qt-streak-num span{font-size:16px;font-weight:700;margin-left:2px}
    .qt-streak-dots{display:flex;gap:8px;margin-top:10px}
    .qt-streak-dot{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff}
    .qt-streak-dot.done{background:rgba(255,255,255,.9);color:var(--orange)}
    .qt-streak-dot.today{background:#fff;color:var(--orange);font-weight:900;box-shadow:0 2px 8px rgba(0,0,0,.15)}

    /* 본문 카드 */
    .qt-passage-card{margin:0 16px 12px;border-radius:var(--radius);background:var(--surface);box-shadow:var(--card-shadow);padding:20px 18px}
    .qt-passage-tag{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--orange);font-weight:800;letter-spacing:.06em;background:var(--orange-soft);padding:4px 10px;border-radius:999px;margin-bottom:10px}
    .qt-passage-title{font-size:20px;font-weight:900;color:var(--text);letter-spacing:-.02em;margin-bottom:3px}
    .qt-passage-ref{font-size:14px;color:var(--orange);font-weight:700;margin-bottom:10px}
    .qt-passage-verse{padding:12px 14px 12px 16px;background:var(--orange-soft);border-left:3px solid var(--orange);border-radius:4px 12px 12px 4px;font-family:'Noto Serif KR',serif;font-size:13.5px;line-height:1.7;color:var(--text);margin-bottom:14px;max-height:80px;overflow-y:auto}
    .qt-passage-verse::-webkit-scrollbar{display:none}
    .qt-cta{display:flex;align-items:center;justify-content:center;width:100%;height:56px;border-radius:14px;background:var(--orange);color:#fff !important;font-size:17px;font-weight:800;transition:all .15s;box-shadow:0 4px 14px rgba(255,159,28,.35);gap:6px;text-align:center}
    .qt-cta:active{transform:scale(.98)}
    .qt-cta.done{background:var(--green-soft);color:var(--green);box-shadow:none;border:2px solid var(--green)}
    .qt-cta.ghost{background:var(--surface-2);color:var(--orange);box-shadow:none;height:44px;font-size:14px;margin-top:8px}

    /* 찬양 카드 */
    .qt-ccm-card{margin:0 16px 12px;border-radius:var(--radius);background:var(--surface);box-shadow:var(--card-shadow);padding:16px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:transform .15s}
    .qt-ccm-card:active{transform:scale(.98)}
    .qt-ccm-thumb{width:44px;height:44px;border-radius:12px;background:#FF0000;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .qt-ccm-label{font-size:11px;color:var(--text-3);font-weight:700;margin-bottom:3px}
    .qt-ccm-title{font-size:15px;font-weight:800;color:var(--text)}
    .qt-ccm-play{width:32px;height:32px;border-radius:50%;background:var(--orange-soft);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:auto}

    /* 암송 카드 */
    .qt-memory-card{margin:0 16px 12px;border-radius:var(--radius);background:var(--yellow-soft);border:1.5px solid rgba(255,212,59,.4);box-shadow:var(--card-shadow);padding:18px 18px}
    .qt-memory-label{font-size:11px;color:var(--orange-dark);font-weight:800;letter-spacing:.06em;margin-bottom:8px}
    .qt-memory-verse{font-family:'Noto Serif KR',serif;font-size:16px;line-height:1.7;color:var(--text);font-weight:600;margin-bottom:10px}
    .qt-memory-ref{font-size:13px;color:var(--orange);font-weight:700}

    /* 퀵메뉴 */
    .qt-quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:0 16px;margin-bottom:12px}
    .qt-quick-item{display:flex;flex-direction:column;align-items:center;gap:7px;padding:14px 8px;background:var(--surface);border-radius:16px;box-shadow:var(--card-shadow);cursor:pointer;transition:transform .15s}
    .qt-quick-item:active{transform:scale(.95)}
    .qt-quick-icon{font-size:26px}
    .qt-quick-label{font-size:12px;font-weight:700;color:var(--text);text-align:center}

    /* 지난 묵상 */
    .qt-past-card{margin:0 16px 12px;border-radius:var(--radius);background:var(--surface);box-shadow:var(--card-shadow);padding:16px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:transform .15s}
    .qt-past-card:active{transform:scale(.98)}
    .qt-past-icon{font-size:28px;flex-shrink:0}
    .qt-past-title{font-size:15px;font-weight:800;color:var(--text)}
    .qt-past-sub{font-size:12px;color:var(--text-3);margin-top:2px;font-weight:600}

    /* 탭바 */
    .qt-tabs{display:flex;padding:6px 8px calc(6px + env(safe-area-inset-bottom));background:var(--surface);border-top:1.5px solid var(--divider);position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:428px;z-index:100;box-shadow:0 -4px 20px rgba(255,159,28,.08)}
    .qt-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0 5px;color:var(--text-3);font-size:11px;font-weight:700}
    .qt-tab.active{color:var(--orange)}
    .qt-tab-icon{font-size:22px;line-height:1}

    /* 나눔 피드 */
    .qt-feed-card{background:var(--surface);border-radius:var(--radius);padding:18px 18px 14px;margin:0 16px 10px;box-shadow:var(--card-shadow)}
    .qt-feed-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .qt-avatar{width:40px;height:40px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:#fff;flex-shrink:0}
    .qt-feed-name{font-size:15px;font-weight:800;color:var(--text)}
    .qt-feed-meta{font-size:12px;color:var(--text-3);margin-top:1px;font-weight:500}
    .qt-feed-verse-box{padding:10px 13px 10px 15px;background:var(--orange-soft);border-left:3px solid var(--orange);border-radius:4px 11px 11px 4px;margin-bottom:10px}
    .qt-feed-verse-ref{font-size:11px;color:var(--orange);font-weight:800;margin-bottom:3px}
    .qt-feed-verse-body{font-family:'Noto Serif KR',serif;font-size:14px;line-height:1.6;color:var(--text)}
    .qt-feed-text{font-size:14px;line-height:1.65;color:var(--text)}
    .qt-feed-actions{display:flex;gap:8px;margin-top:12px;padding-top:10px;border-top:1px solid var(--divider)}
    .qt-feed-btn{flex:1;height:38px;border-radius:10px;background:var(--bg);display:flex;align-items:center;justify-content:center;gap:5px;font-size:13px;font-weight:700;color:var(--text-2)}
    .qt-feed-btn.amened{background:rgba(255,107,157,.12);color:#FF6B9D}

    /* 캘린더 */
    .qt-cal-card{background:var(--surface);border-radius:var(--radius);padding:18px;margin:0 16px 12px;box-shadow:var(--card-shadow)}
    .qt-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
    .qt-cal-dow{text-align:center;font-size:11px;color:var(--text-3);padding:6px 0;font-weight:700}
    .qt-cal-day{aspect-ratio:1;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--text-3);background:var(--bg)}
    .qt-cal-day.empty{background:transparent}
    .qt-cal-day.done{background:var(--green-soft);color:var(--green)}
    .qt-cal-day.today{background:var(--orange);color:#fff;box-shadow:0 3px 10px rgba(255,159,28,.4)}
    .qt-cal-day.miss{opacity:.5}
    .qt-cal-day.future{opacity:.3}
    .qt-stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:0 16px 12px}
    .qt-stat-card{background:var(--surface);border-radius:16px;padding:15px 13px;box-shadow:var(--card-shadow);text-align:center}
    .qt-stat-icon{font-size:20px;margin-bottom:5px}
    .qt-stat-num{font-size:24px;font-weight:900;color:var(--text);letter-spacing:-.02em}
    .qt-stat-label{font-size:11px;color:var(--text-3);font-weight:700;margin-top:2px}

    /* 뱃지 */
    .qt-badge-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:0 16px;margin-bottom:12px}
    .qt-badge-item{display:flex;flex-direction:column;align-items:center;gap:5px}
    .qt-badge-icon{width:58px;height:58px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px}
    .qt-badge-icon.earned{background:var(--yellow-soft);box-shadow:0 3px 12px rgba(255,212,59,.3)}
    .qt-badge-icon.locked{background:var(--bg);filter:grayscale(1);opacity:.3}
    .qt-badge-name{font-size:11px;font-weight:700;color:var(--text-2);text-align:center;line-height:1.3}

    /* 더보기 */
    .qt-profile-card{background:linear-gradient(135deg,var(--orange),#FFB444);border-radius:var(--radius);padding:20px 18px;margin:0 16px 12px;box-shadow:0 6px 24px rgba(255,159,28,.3);color:#fff}
    .qt-profile-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
    .qt-profile-av{width:54px;height:54px;border-radius:16px;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900}
    .qt-profile-name{font-size:20px;font-weight:900}
    .qt-profile-sub{font-size:13px;color:rgba(255,255,255,.75);margin-top:1px;font-weight:600}
    .qt-profile-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    .qt-profile-stat{background:rgba(255,255,255,.2);border-radius:12px;padding:10px 8px;text-align:center}
    .qt-profile-stat-num{font-size:20px;font-weight:900}
    .qt-profile-stat-label{font-size:10px;color:rgba(255,255,255,.75);font-weight:700;margin-top:1px}
    .qt-more-item{display:flex;align-items:center;gap:12px;width:100%;padding:15px 18px;background:var(--surface);margin-bottom:8px;border-radius:16px;box-shadow:var(--card-shadow)}
    .qt-more-icon{font-size:22px;width:32px;text-align:center;flex-shrink:0}
    .qt-more-label{font-size:15px;font-weight:700;color:var(--text)}
    .qt-more-chev{margin-left:auto;color:var(--text-3);font-size:18px}

    /* 묵상 작성 */
    .qt-write-screen{position:fixed;inset:0;z-index:50;background:var(--bg);overflow-y:auto}
    .qt-toggle{width:50px;height:28px;border-radius:28px;background:var(--bg);position:relative;transition:background .2s;flex-shrink:0}
    .qt-toggle::after{content:'';position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:var(--text-3);transition:transform .2s}
    .qt-toggle.on{background:var(--orange)}.qt-toggle.on::after{transform:translateX(22px);background:#fff}
    
    /* 대시보드 */
    .dash-wrap{position:fixed;inset:0;background:var(--bg);z-index:60;overflow-y:auto}
    .dash-head{background:linear-gradient(135deg,var(--orange),#FFB444);padding:22px 20px 18px;color:#fff}
    .dash-head-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
    .dash-head-title{font-size:20px;font-weight:900}
    .dash-back{padding:8px 16px;border-radius:10px;background:rgba(255,255,255,.25);color:#fff;font-size:13px;font-weight:700;cursor:pointer}
    .dash-kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 16px 0}
    .dash-kpi{background:var(--surface);border-radius:16px;padding:15px 15px 13px;box-shadow:var(--card-shadow)}
    .dash-kpi-label{font-size:12px;color:var(--text-2);font-weight:700}
    .dash-kpi-val{font-size:30px;font-weight:900;color:var(--text);margin-top:3px;letter-spacing:-.02em}
    .dash-kpi-val .u{font-size:13px;color:var(--text-3);font-weight:700;margin-left:2px}
    .dash-kpi-sub{font-size:11px;color:var(--orange);font-weight:700;margin-top:3px}
    .dash-panel{background:var(--surface);border-radius:var(--radius);padding:16px 16px 12px;margin:10px 16px 0;box-shadow:var(--card-shadow)}
    .dash-panel-title{font-size:15px;font-weight:800;color:var(--text);margin-bottom:12px}
    .dash-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--divider)}
    .dash-row:last-child{border-bottom:0}
    .dash-av{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff;flex-shrink:0}
    .dash-name{font-size:14px;font-weight:800;color:var(--text)}
    .dash-bar-wrap{height:7px;border-radius:4px;background:var(--bg);overflow:hidden;flex:1}
    .dash-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--orange),var(--yellow))}
    .dash-pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:800}
    .dash-pill.good{background:var(--green-soft);color:var(--green)}
    .dash-pill.mid{background:var(--orange-soft);color:var(--orange)}
    .dash-pill.low{background:rgba(239,68,68,.1);color:var(--red)}
    .dash-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
    .dash-dot.done{background:var(--green)}
    .dash-dot.miss{background:var(--bg);border:1.5px solid var(--text-3)}
    .live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:4px;animation:pulse 2s ease infinite}

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithPopup, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, signOut, onAuthStateChanged, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, addDoc, query, where, orderBy, onSnapshot, updateDoc, increment, serverTimestamp, limit, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyAjRbt60qMNRLwKqmR6fbuJUHm8fa-Pjmo",
  authDomain:"youthqt-b1f6e.firebaseapp.com",
  projectId:"youthqt-b1f6e",
  storageBucket:"youthqt-b1f6e.firebasestorage.app",
  messagingSenderId:"328744786426",
  appId:"1:328744786426:web:7c9d8280361ffa0203ec43"
});
const auth=getAuth(app), db=getFirestore(app), gp=new GoogleAuthProvider();
window._fb={auth,db,gp,signInWithPopup,signInWithEmailAndPassword,createUserWithEmailAndPassword,updateProfile,signOut,onAuthStateChanged,doc,setDoc,getDoc,collection,addDoc,query,where,orderBy,onSnapshot,updateDoc,increment,serverTimestamp,limit,deleteDoc,getDocs};

onAuthStateChanged(auth,async(user)=>{
  document.getElementById('loading').classList.add('hidden');
  if(user){
    const uRef=doc(db,'users_youth',user.uid);
    const snap=await getDoc(uRef);
    const uData=snap.exists()?snap.data():{name:user.displayName||'친구',email:user.email||'',role:'학생',group:'미배정',isLeader:false,points:0};
    if(!snap.exists())await setDoc(uRef,{...uData,createdAt:serverTimestamp()});
    window._me={uid:user.uid,name:user.displayName||uData.name||'친구',email:user.email||'',role:uData.role||'학생',group:uData.group||'미배정',isLeader:uData.isLeader||false,points:uData.points||0};
    document.getElementById('login-screen').classList.remove('visible');
    document.getElementById('app').classList.add('visible');
    const tryMount=()=>{
      if(window._reactMounted)return;
      if(window._mountApp){window._reactMounted=true;window._mountApp();}
      else setTimeout(tryMount,60);
    };
    tryMount();
  }else{
    window._me=null;
    document.getElementById('login-screen').classList.add('visible');
    document.getElementById('app').classList.remove('visible');
  }
});

function makeEmail(n,b){return`${encodeURIComponent(n.trim()).replace(/%/g,'').toLowerCase().slice(0,20)}_${b}@qt-youth.local`;}
window.switchTab=t=>{['simple','email','google'].forEach(x=>{document.getElementById('panel-'+x).style.display=x===t?'block':'none';document.getElementById('tab-'+x).classList.toggle('active',x===t);});};
window.showSimpleLogin=()=>{document.getElementById('simple-signup').style.display='none';document.getElementById('simple-login').style.display='block';};
window.showSimpleSignup=()=>{document.getElementById('simple-signup').style.display='block';document.getElementById('simple-login').style.display='none';};
window.birthInput=(el,nId,ml)=>{if(el.value.length>=ml&&nId)document.getElementById(nId).focus();};
window.handleSimpleSignup=async()=>{
  const n=document.getElementById('s-name').value.trim(),yy=document.getElementById('s-yy').value.trim(),mm=document.getElementById('s-mm').value.trim().padStart(2,'0'),dd=document.getElementById('s-dd').value.trim().padStart(2,'0'),err=document.getElementById('simple-err');err.textContent='';
  if(!n){err.textContent='이름을 입력해주세요';return;}if(yy.length!==4||!mm||!dd){err.textContent='생년월일을 모두 입력해주세요';return;}
  const b=`${yy}${mm}${dd}`,email=makeEmail(n,b),pw=`qt_${b}_${n.slice(0,2)}`;
  try{const c=await createUserWithEmailAndPassword(auth,email,pw);await updateProfile(c.user,{displayName:n});await setDoc(doc(db,'users_youth',c.user.uid),{name:n,email,role:'학생',group:'미배정',isLeader:false,points:0,createdAt:serverTimestamp()});}
  catch(e){err.textContent=e.code==='auth/email-already-in-use'?'이미 가입된 이름+생년월일이에요. "이름으로 로그인"을 눌러주세요.':'가입에 실패했어요.';}
};
window.handleSimpleLogin=async()=>{
  const n=document.getElementById('sl-name').value.trim(),yy=document.getElementById('sl-yy').value.trim(),mm=document.getElementById('sl-mm').value.trim().padStart(2,'0'),dd=document.getElementById('sl-dd').value.trim().padStart(2,'0'),err=document.getElementById('simple-login-err');err.textContent='';
  if(!n||yy.length!==4){err.textContent='이름과 생년월일을 입력해주세요';return;}
  try{await signInWithEmailAndPassword(auth,makeEmail(n,`${yy}${mm}${dd}`),`qt_${yy}${mm}${dd}_${n.slice(0,2)}`);}
  catch(e){err.textContent='이름 또는 생년월일이 맞지 않아요.';}
};
window.handleEmailLogin=async()=>{const email=document.getElementById('ln-email').value.trim(),pw=document.getElementById('ln-pw').value,err=document.getElementById('ln-err');err.textContent='';try{await signInWithEmailAndPassword(auth,email,pw);}catch(e){err.textContent='이메일 또는 비밀번호를 확인해주세요';}};
window.handleSignup=async()=>{const n=document.getElementById('ln-name').value.trim(),email=document.getElementById('ln-su-email').value.trim(),pw=document.getElementById('ln-su-pw').value,err=document.getElementById('ln-su-err');err.textContent='';if(!n){err.textContent='이름을 입력해주세요';return;}try{const c=await createUserWithEmailAndPassword(auth,email,pw);await updateProfile(c.user,{displayName:n});await setDoc(doc(db,'users_youth',c.user.uid),{name:n,email,role:'학생',group:'미배정',isLeader:false,points:0,createdAt:serverTimestamp()});}catch(e){err.textContent={'auth/email-already-in-use':'이미 사용 중인 이메일이에요','auth/weak-password':'비밀번호는 6자 이상이어야 해요'}[e.code]||'회원가입에 실패했어요';}};
window.toggleEmailMode=()=>{const isLogin=document.getElementById('email-signup-form').style.display==='none';document.getElementById('email-login-form').style.display=isLogin?'none':'block';document.getElementById('email-signup-form').style.display=isLogin?'block':'none';};
window.handleGoogleLogin=async()=>{try{await signInWithPopup(auth,gp);}catch(e){alert('크롬 브라우저로 열어주세요.');}};
</script>

<script type="text/babel" data-presets="react">

const SCHEDULE=[

  {date:'2026-05-01',book:'룻기',range:'1:1-14',title:'나오미와 두 며느리',verse:'나오미가 두 며느리에게 이르되 너희는 각기 너희 어머니의 집으로 돌아가라 여호와께서 너희를 선대하시기를 원하며 (룻 1:8)',text:[

    {v:5, t:'말론과 기룐도 둘 다 죽어 나오미는 남편도 두 아들도 없이 혼자 남게 됐습니다.'},
    {v:6, t:'나오미는 며느리들과 함께 모압 지방을 떠나 돌아가려고 준비했습니다. 그 곳에 있는 동안 여호와께서 자기 백성을 돌아보시고 양식을 주셨다는 소식을 들었기 때문입니다.'},
    {v:7, t:'그래서 나오미는 두 며느리와 함께 자기가 살던 곳을 떠났습니다. 그들은 유다 땅으로 돌아가는 길을 가고 있었습니다.'},

    {v:14, t:'그들은 또 소리 높여 울었습니다. 오르바는 시어머니에게 작별 인사를 하고 돌아갔지만 룻은 시어머니 곁에 꼭 붙어 있었습니다.'}

    {v:15, t:'나오미가 말했습니다. "봐라, 네 동서는 자기 백성과 자기 신들에게 돌아갔다. 너도 네 동서를 따라 돌아가거라."'},
